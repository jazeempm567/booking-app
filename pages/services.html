<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Home - Zahi Spa</title>
    <meta http-equiv="refresh" content="0; url=../index.html#services-section">
    <script>
        const target = new URL('../index.html', window.location.href);
        target.search = window.location.search;
        target.hash = window.location.hash || '#services-section';
        window.location.replace(target.toString());
    </script>
</head>
<body>
    <p>Redirecting to the homepage. If you are not redirected, <a href="../index.html#services-section">open services on the homepage</a>.</p>
</body>
</html>
