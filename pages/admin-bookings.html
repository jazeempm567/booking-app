<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Zahi Spa - Admin Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: #f8f9fa;
        }
        
        .navbar {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            padding: 15px 0;
        }
        
        .navbar-brand {
            font-size: 22px;
            font-weight: 600;
            color: #d4af37;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .logout-btn:hover {
            background: #c82333;
        }
        
        .container {
            margin-top: 30px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #d4af37;
        }
        
        .page-header h2 {
            color: #333;
            margin: 0;
            font-weight: 600;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #d4af37;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }
        
        .table-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        table {
            margin: 0;
        }
        
        table thead {
            background: #f8f9fa;
            border-bottom: 2px solid #d4af37;
        }
        
        table td {
            vertical-align: middle;
            padding: 15px;
        }
        
        .btn-view {
            background: #007bff;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .btn-view:hover {
            background: #0056b3;
        }
        
        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-delete:hover {
            background: #c82333;
        }
        
        .btn-refresh {
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-refresh:hover {
            background: #c9a227;
        }
        
        .badge-confirmed {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .badge-pending {
            background: #ffc107;
            color: #1a1a1a;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .modal-content {
            border: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .modal-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #d4af37;
            border: none;
        }
        
        .booking-detail-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .booking-detail-item {
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        
        .booking-detail-label {
            color: #666;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .booking-detail-value {
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
            
            .booking-detail-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand">📋 Bookings Dashboard</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="page-header">
            <h2>📅 Booking Management</h2>
            <button class="btn-refresh" onclick="loadBookings()">🔄 Refresh</button>
        </div>

        <!-- Statistics -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-number" id="totalBookings">0</div>
                <div class="stat-label">Total Bookings</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="confirmedBookings">0</div>
                <div class="stat-label">Confirmed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalRevenue">0 AED</div>
                <div class="stat-label">Total Revenue</div>
            </div>
        </div>

        <!-- Bookings Table -->
        <div class="table-container">
            <div id="emptyState" class="empty-state">
                <i class="fas fa-inbox"></i>
                <h4>No Bookings Yet</h4>
                <p style="color: #ccc;">Bookings will appear here when customers complete payments.</p>
            </div>

            <table id="bookingsTable" class="table" style="display: none;">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Customer Name</th>
                        <th>Service</th>
                        <th>Date & Time</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Booking Details Modal -->
    <div class="modal fade" id="bookingModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Booking Details</h5>
                    <button type="button" class="close" data-dismiss="modal" style="color: #d4af37;">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="bookingDetails"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ── Check authentication ──
        function checkAuth() {
            if (!sessionStorage.getItem('adminBookingsLoggedIn')) {
                promptLogin();
            } else {
                loadBookings();
                // Auto-refresh every 5 seconds
                setInterval(loadBookings, 5000);
            }
        }

        // ── Login prompt ──
        function promptLogin() {
            const password = prompt('🔐 Enter Admin Password:');
            if (password === 'admin123') {
                sessionStorage.setItem('adminBookingsLoggedIn', 'true');
                loadBookings();
                // Auto-refresh every 5 seconds
                setInterval(loadBookings, 5000);
            } else if (password !== null) {
                alert('❌ Incorrect password');
                promptLogin();
            } else {
                window.location.href = '/';
            }
        }

        // ── Logout ──
        function logout() {
            sessionStorage.removeItem('adminBookingsLoggedIn');
            window.location.href = '/';
        }

        // ── Load all bookings ──
        async function loadBookings() {
            try {
                const response = await fetch('/api/bookings');
                const bookings = await response.json();

                // Update statistics
                document.getElementById('totalBookings').textContent = bookings.length;
                const confirmed = bookings.filter(b => b.status === 'confirmed').length;
                document.getElementById('confirmedBookings').textContent = confirmed;
                const revenue = bookings.reduce((sum, b) => sum + (parseFloat(b.amount) || 0), 0);
                document.getElementById('totalRevenue').textContent = revenue.toFixed(2) + ' AED';

                // Show/hide table
                if (bookings.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    document.getElementById('bookingsTable').style.display = 'none';
                    return;
                }

                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('bookingsTable').style.display = 'table';

                // Populate table
                const tbody = document.getElementById('bookingsTableBody');
                tbody.innerHTML = '';

                bookings.forEach(booking => {
                    const row = document.createElement('tr');
                    const statusBadge = `<span class="badge-${booking.status || 'pending'}">${(booking.status || 'pending').toUpperCase()}</span>`;

                    row.innerHTML = `
                        <td><strong>${booking.id}</strong></td>
                        <td>${booking.customerName || 'N/A'}</td>
                        <td>${booking.serviceName || 'N/A'}</td>
                        <td>${booking.bookingDate || 'N/A'} ${booking.bookingTime || ''}</td>
                        <td><strong>${booking.amount || 0} AED</strong></td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn-view" onclick="viewBookingDetails('${booking.id}')">
                                <i class="fas fa-eye"></i> View
                            </button>
                            <button class="btn-delete" onclick="deleteBooking('${booking.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading bookings:', error);
                alert('Error loading bookings: ' + error.message);
            }
        }

        // ── View booking details ──
        async function viewBookingDetails(bookingId) {
            try {
                const response = await fetch(`/api/bookings/${bookingId}`);
                const booking = await response.json();

                let detailsHtml = `
                    <div class="booking-detail-row">
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Booking ID</div>
                            <div class="booking-detail-value">${booking.id || 'N/A'}</div>
                        </div>
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Payment ID</div>
                            <div class="booking-detail-value">${booking.paymentIntentId || 'N/A'}</div>
                        </div>
                    </div>

                    <div class="booking-detail-row">
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Customer Name</div>
                            <div class="booking-detail-value">${booking.customerName || 'N/A'}</div>
                        </div>
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Customer Email</div>
                            <div class="booking-detail-value">${booking.customerEmail || 'N/A'}</div>
                        </div>
                    </div>

                    <div class="booking-detail-row">
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Service Name</div>
                            <div class="booking-detail-value">${booking.serviceName || 'N/A'}</div>
                        </div>
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Staff Member</div>
                            <div class="booking-detail-value">${booking.staffName || 'N/A'}</div>
                        </div>
                    </div>

                    <div class="booking-detail-row">
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Date</div>
                            <div class="booking-detail-value">${booking.bookingDate || 'N/A'}</div>
                        </div>
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Time</div>
                            <div class="booking-detail-value">${booking.bookingTime || 'N/A'}</div>
                        </div>
                    </div>

                    <div class="booking-detail-row">
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Duration</div>
                            <div class="booking-detail-value">${booking.serviceDuration || 'N/A'} min</div>
                        </div>
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Location</div>
                            <div class="booking-detail-value">${booking.serviceLocation === 'home' ? '🏠 Customer Home' : '🏢 Studio'}</div>
                        </div>
                    </div>

                    <div class="booking-detail-row">
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Service Price</div>
                            <div class="booking-detail-value">${booking.price || 0} AED</div>
                        </div>
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">VAT (5%)</div>
                            <div class="booking-detail-value">${booking.vat || 0} AED</div>
                        </div>
                    </div>

                    <div class="booking-detail-row">
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Total Amount</div>
                            <div class="booking-detail-value" style="font-size: 20px; color: #d4af37;"><strong>${booking.amount || 0} AED</strong></div>
                        </div>
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Status</div>
                            <div class="booking-detail-value">
                                <span class="badge-${booking.status || 'pending'}">${(booking.status || 'pending').toUpperCase()}</span>
                            </div>
                        </div>
                    </div>

                    <div class="booking-detail-row">
                        <div class="booking-detail-item">
                            <div class="booking-detail-label">Booked On</div>
                            <div class="booking-detail-value">${booking.createdAt ? new Date(booking.createdAt).toLocaleString() : 'N/A'}</div>
                        </div>
                    </div>
                `;

                document.getElementById('bookingDetails').innerHTML = detailsHtml;
                $('#bookingModal').modal('show');
            } catch (error) {
                alert('Error loading booking details: ' + error.message);
            }
        }

        // ── Delete booking ──
        async function deleteBooking(bookingId) {
            if (!confirm('Are you sure you want to delete this booking?')) return;

            try {
                const response = await fetch(`/api/bookings/${bookingId}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    alert('✅ Booking deleted');
                    loadBookings();
                } else {
                    alert('❌ Failed to delete booking');
                }
            } catch (error) {
                alert('Error deleting booking: ' + error.message);
            }
        }

        // ── Initialize on page load ──
        window.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
